name: Release - Admin

on:
  workflow_call:
    inputs:
      releases_created:
        description: "Whether release-please created a release for this component"
        type: string
        required: true
      tag_name:
        description: "The tag created by release-please for the admin package (empty when no release was created)"
        type: string
        required: true

jobs:
  # This job runs tests before the creation of the prerelease
  prerelease-test:
    name: Run Admin Prerelease Tests
    runs-on: ubuntu-latest
    if: ${{ inputs.releases_created == 'false' }}
    steps:
      - name: Admin Tests
        run: |
          echo "Running admin-specific prerelease tests"

  # This job runs the admin prerelease steps
  prerelease:
    name: Create Admin Prerelease
    runs-on: ubuntu-latest
    if: ${{ inputs.releases_created == 'true' && contains(inputs.tag_name, 'rc') }}
    steps:
      - name: Admin Prerelease Build and Deploy
        run: |
          echo "Building and deploying admin prerelease ${{ inputs.tag_name }}"

  # This job runs post-prerelease steps for the admin
  post-prerelease:
    name: Post Admin Prerelease Steps
    runs-on: ubuntu-latest
    needs: [ prerelease ]
    steps:
      - name: Post Admin Prerelease Step
        run: |
          echo "Running admin post-prerelease steps for ${{ inputs.tag_name }}"

  # This job creates the final admin release
  release:
    name: Create Admin Release
    runs-on: ubuntu-latest
    if: ${{ inputs.releases_created == 'true' && !contains(inputs.tag_name, 'rc') }}
    steps:
      - name: Admin Release Build and Deploy
        run: |
          echo "Building and deploying admin production release ${{ inputs.tag_name }}"

  # This job runs post-release steps for the admin
  post-release:
    name: Post Admin Release Steps
    runs-on: ubuntu-latest
    needs: [ release ]
    steps:
      - name: Post Admin Release Step
        run: |
          echo "Running admin post-release steps for ${{ inputs.tag_name }}"
