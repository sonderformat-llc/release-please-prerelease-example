name: Release - Backend

on:
  workflow_call:
    inputs:
      releases_created:
        description: "Whether release-please created a release for this component"
        type: string
        required: true
      tag_name:
        description: "The tag created by release-please for the backend package (empty when no release was created)"
        type: string
        required: true

jobs:
  # This job runs tests before the creation of the prerelease
  prerelease-test:
    name: Run Backend Prerelease Tests
    runs-on: ubuntu-latest
    if: ${{ inputs.releases_created == 'false' }}
    steps:
      - name: Backend Tests
        run: |
          echo "Running backend-specific prerelease tests"

  # This job runs the backend prerelease steps
  prerelease:
    name: Create Backend Prerelease
    runs-on: ubuntu-latest
    if: ${{ inputs.releases_created == 'true' && contains(inputs.tag_name, 'rc') }}
    steps:
      - name: Backend Prerelease Build and Deploy
        run: |
          echo "Building and deploying backend prerelease ${{ inputs.tag_name }}"

  # This job runs post-prerelease steps for the backend
  post-prerelease:
    name: Post Backend Prerelease Steps
    runs-on: ubuntu-latest
    needs: [ prerelease ]
    steps:
      - name: Post Backend Prerelease Step
        run: |
          echo "Running backend post-prerelease steps for ${{ inputs.tag_name }}"

  # This job creates the final backend release
  release:
    name: Create Backend Release
    runs-on: ubuntu-latest
    if: ${{ inputs.releases_created == 'true' && !contains(inputs.tag_name, 'rc') }}
    steps:
      - name: Backend Release Build and Deploy
        run: |
          echo "Building and deploying backend production release ${{ inputs.tag_name }}"

  # This job runs post-release steps for the backend
  post-release:
    name: Post Backend Release Steps
    runs-on: ubuntu-latest
    needs: [ release ]
    steps:
      - name: Post Backend Release Step
        run: |
          echo "Running backend post-release steps for ${{ inputs.tag_name }}"
