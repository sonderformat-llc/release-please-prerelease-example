name: Release - Backend

on:
  # Triggered independently when files in the backend directory are pushed to main.
  # This allows the backend component to be released separately from frontend and admin.
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"

# The different jobs of this workflow need the following permissions
permissions:
  contents: write
  pull-requests: write
  repository-projects: read
  # only required for workflows in private repositories
  actions: read

concurrency:
  group: release-backend

jobs:
  # This job creates the necessary labels for the release-please PRs:
  # https://github.com/googleapis/release-please-action/issues/1074
  label-check:
    name: Create release-please PR labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Add labels to the repository if not present
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "autorelease: pending" -c FBCA04 -d "release-please PR tagging - Pending release" || true
          gh label create "autorelease: tagged" -c D4C5F9 -d "release-please PR tagging - Ready for release" || true
          gh label create "autorelease: snapshot" -c D4C5F9 -d "release-please PR tagging - Ready for release" || true
          gh label create "autorelease: published" -c 0E8A16 -d "release-please PR tagging - Released" || true

  # This job creates or finalizes a prerelease pull request for the backend package
  # and provides the necessary outputs for the subsequent jobs.
  prerelease-prep:
    name: Create Backend Prerelease Pull Request
    runs-on: ubuntu-latest
    needs: [ label-check ]
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      # For named packages, use the <path>--tag_name output pattern.
      tag_name: ${{ steps.release.outputs['backend--tag_name'] }}
    steps:
      - id: release
        name: Run prerelease release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: ".github/prerelease-config-backend.json"
          manifest-file: ".github/prerelease-manifest-backend.json"
          #token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

  # When a prerelease (RC) tag is produced, run release-please with the release config
  # to open the final-release pull request so it is ready to merge when QA signs off.
  create-release-pr:
    name: Create Backend Release Pull Request
    runs-on: ubuntu-latest
    needs: [ prerelease-prep ]
    if: ${{ needs.prerelease-prep.outputs.releases_created == 'true' && contains(needs.prerelease-prep.outputs.tag_name, 'rc') }}
    steps:
      - name: Run release release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: ".github/release-config-backend.json"
          manifest-file: ".github/release-manifest-backend.json"
          #token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

  # This job runs backend-specific tests before the creation of a prerelease
  prerelease-test:
    name: Run Backend Prerelease Tests
    runs-on: ubuntu-latest
    needs: [ prerelease-prep ]
    if: ${{ needs.prerelease-prep.outputs.releases_created == 'false' }}
    steps:
      - name: Backend Tests
        run: |
          echo "Running backend-specific prerelease tests"

  # This job builds and deploys the backend prerelease artifact
  prerelease:
    name: Create Backend Prerelease
    runs-on: ubuntu-latest
    needs: [ prerelease-prep ]
    if: ${{ needs.prerelease-prep.outputs.releases_created == 'true' && contains(needs.prerelease-prep.outputs.tag_name, 'rc') }}
    steps:
      - name: Backend Prerelease Build and Deploy
        run: |
          echo "Building and deploying backend prerelease ${{ needs.prerelease-prep.outputs.tag_name }}"

  # This job runs post-prerelease steps for the backend
  post-prerelease:
    name: Post Backend Prerelease Steps
    runs-on: ubuntu-latest
    needs: [ prerelease ]
    steps:
      - name: Post Backend Prerelease Step
        run: |
          echo "Running backend post-prerelease steps for ${{ needs.prerelease-prep.outputs.tag_name }}"

  # This job builds and deploys the final backend production release
  release:
    name: Create Backend Release
    runs-on: ubuntu-latest
    needs: [ prerelease-prep ]
    if: ${{ needs.prerelease-prep.outputs.releases_created == 'true' && !contains(needs.prerelease-prep.outputs.tag_name, 'rc') }}
    steps:
      - name: Backend Release Build and Deploy
        run: |
          echo "Building and deploying backend production release ${{ needs.prerelease-prep.outputs.tag_name }}"

  # This job runs post-release steps for the backend
  post-release:
    name: Post Backend Release Steps
    runs-on: ubuntu-latest
    needs: [ release ]
    steps:
      - name: Post Backend Release Step
        run: |
          echo "Running backend post-release steps for ${{ needs.prerelease-prep.outputs.tag_name }}"

