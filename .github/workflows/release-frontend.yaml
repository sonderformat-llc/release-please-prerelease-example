name: Release - Frontend

on:
  workflow_call:
    inputs:
      releases_created:
        description: "Whether release-please created a release for this component"
        type: string
        required: true
      tag_name:
        description: "The tag created by release-please for the frontend package (empty when no release was created)"
        type: string
        required: true

jobs:
  # This job runs tests before the creation of the prerelease
  prerelease-test:
    name: Run Frontend Prerelease Tests
    runs-on: ubuntu-latest
    if: ${{ inputs.releases_created == 'false' }}
    steps:
      - name: Frontend Tests
        run: |
          echo "Running frontend-specific prerelease tests"

  # This job runs the frontend prerelease steps
  prerelease:
    name: Create Frontend Prerelease
    runs-on: ubuntu-latest
    if: ${{ inputs.releases_created == 'true' && contains(inputs.tag_name, 'rc') }}
    steps:
      - name: Frontend Prerelease Build and Deploy
        run: |
          echo "Building and deploying frontend prerelease ${{ inputs.tag_name }}"

  # This job runs post-prerelease steps for the frontend
  post-prerelease:
    name: Post Frontend Prerelease Steps
    runs-on: ubuntu-latest
    needs: [ prerelease ]
    steps:
      - name: Post Frontend Prerelease Step
        run: |
          echo "Running frontend post-prerelease steps for ${{ inputs.tag_name }}"

  # This job creates the final frontend release
  release:
    name: Create Frontend Release
    runs-on: ubuntu-latest
    if: ${{ inputs.releases_created == 'true' && !contains(inputs.tag_name, 'rc') }}
    steps:
      - name: Frontend Release Build and Deploy
        run: |
          echo "Building and deploying frontend production release ${{ inputs.tag_name }}"

  # This job runs post-release steps for the frontend
  post-release:
    name: Post Frontend Release Steps
    runs-on: ubuntu-latest
    needs: [ release ]
    steps:
      - name: Post Frontend Release Step
        run: |
          echo "Running frontend post-release steps for ${{ inputs.tag_name }}"
