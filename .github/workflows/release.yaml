name: Release

on:
  # Triggers the workflow on push events but only for default and protected branches
  push:
    branches: [ "main" ]

# The different jobs of this workflow need the following permissions
permissions:
  contents: write
  pull-requests: write
  repository-projects: read
  # only required for workflows in private repositories
  actions: read

concurrency:
  group: release

jobs:
  # This job creates the necessary labels for the release-please PRs:
  # https://github.com/googleapis/release-please-action/issues/1074
  label-check:
    name: Create release-please PR labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Add labels to the repository if not present
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "autorelease: pending" -c FBCA04 -d "release-please PR tagging - Pending release" || true
          gh label create "autorelease: tagged" -c D4C5F9 -d "release-please PR tagging - Ready for release" || true
          gh label create "autorelease: snapshot" -c D4C5F9 -d "release-please PR tagging - Ready for release" || true
          gh label create "autorelease: published" -c 0E8A16 -d "release-please PR tagging - Released" || true

  # This job creates or finalizes a prerelease pull request or finalizes a release pull request
  # and provides the necessary outputs for the subsequent component release jobs.
  prerelease-prep:
    name: Create Prerelease Pull Request
    runs-on: ubuntu-latest
    needs: [ label-check ]
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      # For named packages, use the <path>--tag_name output instead of the generic tag_name.
      # Each package exposes its own output key using the pattern: <path>--tag_name
      frontend_tag: ${{ steps.release.outputs['frontend--tag_name'] }}
      backend_tag: ${{ steps.release.outputs['backend--tag_name'] }}
      admin_tag: ${{ steps.release.outputs['admin--tag_name'] }}
    steps:
      - id: release
        name: Run prerelease release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: ".github/prerelease-config.json"
          manifest-file: ".github/prerelease-manifest.json"
          #token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

  # When any package produced a prerelease (RC) tag, create the corresponding
  # final-release pull request so it is ready to be merged when QA signs off.
  create-release-prs:
    name: Create Release Pull Requests
    runs-on: ubuntu-latest
    needs: [ prerelease-prep ]
    if: >-
      ${{
        needs.prerelease-prep.outputs.releases_created == 'true' && (
          contains(needs.prerelease-prep.outputs.frontend_tag, 'rc') ||
          contains(needs.prerelease-prep.outputs.backend_tag, 'rc') ||
          contains(needs.prerelease-prep.outputs.admin_tag, 'rc')
        )
      }}
    steps:
      - name: Run release release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: ".github/release-config.json"
          manifest-file: ".github/release-manifest.json"
          #token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

  # Component-specific release workflows are called in parallel.
  # Each workflow receives the overall releases_created flag and its own package tag,
  # and is responsible for component-specific tests, builds, and deployment steps.

  frontend-release:
    name: Frontend Release
    needs: [ prerelease-prep ]
    uses: ./.github/workflows/release-frontend.yaml
    with:
      releases_created: ${{ needs.prerelease-prep.outputs.releases_created }}
      tag_name: ${{ needs.prerelease-prep.outputs.frontend_tag }}

  backend-release:
    name: Backend Release
    needs: [ prerelease-prep ]
    uses: ./.github/workflows/release-backend.yaml
    with:
      releases_created: ${{ needs.prerelease-prep.outputs.releases_created }}
      tag_name: ${{ needs.prerelease-prep.outputs.backend_tag }}

  admin-release:
    name: Admin Release
    needs: [ prerelease-prep ]
    uses: ./.github/workflows/release-admin.yaml
    with:
      releases_created: ${{ needs.prerelease-prep.outputs.releases_created }}
      tag_name: ${{ needs.prerelease-prep.outputs.admin_tag }}

